global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: "agromind-monitor"

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "agromind-api"
    static_configs:
      - targets: ["localhost:8000"]
    metrics_path: "/metrics"
    scrape_interval: 5s

  - job_name: "postgres"
    static_configs:
      - targets: ["localhost:5432"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: localhost:9187

  - job_name: "redis"
    static_configs:
      - targets: ["localhost:6379"]

  - job_name: "kafka"
    static_configs:
      - targets: ["localhost:9308"]

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - localhost:9093

rule_files:
  - "/etc/prometheus/rules.yml"
